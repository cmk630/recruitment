server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:mem:recruitmentTest
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create # 애플리케이션 실행 시 스키마 자동 생성
    properties:
      hibernate:
        format_sql: true
        show_sql: true
    defer-datasource-initialization: true

  # API 응답에서 null 필드는 포함하지 않음
  jackson:
    default-property-inclusion: non_null

logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace # SQL 파라미터 로깅
